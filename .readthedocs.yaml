# ReadTheDocs configuration — https://docs.readthedocs.io/en/stable/config-file/v2.html
#
# RTD builds in its own isolated Linux environment; local builds on any
# OS use the same entry point:  sphinx-build -b html docs docs/_build/html
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"

python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs

sphinx:
  configuration: docs/conf.py
  # Keep false while the skeleton grows; flip to true before v0.1.0
  # release so CI catches broken cross-references.
  fail_on_warning: false# ReadTheDocs configuration — https://docs.readthedocs.io/en/stable/config-file/v2.html
