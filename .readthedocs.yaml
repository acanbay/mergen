# ReadTheDocs configuration — https://docs.readthedocs.io/en/stable/config-file/v2.html
#
# ReadTheDocs does NOT execute the examples: the pre_build job downloads
# the gallery already built by the docs-gallery workflow, and the build
# runs with plot_gallery=False so sphinx-gallery assembles the pages
# from the downloaded output instead of running the scripts. This keeps
# the RTD build within its time limit; the examples are still executed
# on every gallery workflow run, which is the scientific guarantee that
# they work against the current code.
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  jobs:
    pre_build:
      - curl -fL -o gallery.tar.gz https://github.com/acanbay/mergen/releases/download/docs-gallery/gallery.tar.gz
      - tar xzf gallery.tar.gz -C docs

python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs

sphinx:
  configuration: docs/conf.py
  fail_on_warning: true
