# ReadTheDocs configuration — https://docs.readthedocs.io/en/stable/config-file/v2.html
#
# RTD builds in its own isolated Linux environment; local builds on any
# OS use the same entry point:  sphinx-build -b html docs docs/_build/html
#
# RTD executes the fifteen examples itself as part of the build. The
# documentation builds warning-free and must stay that way.
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"

python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs

sphinx:
  configuration: docs/conf.py
  fail_on_warning: true
