# ReadTheDocs configuration — https://docs.readthedocs.io/en/stable/config-file/v2.html
#
# ReadTheDocs does not execute the examples. The pre_build job
# downloads the gallery already built by the docs-gallery workflow
# (stored on the dedicated docs-gallery branch), and the
# sphinx-gallery MD5 cache recognises the pages as current, so the
# build assembles the site without running any script and stays
# inside the time limit. If an example changes without the gallery
# being regenerated, the MD5 no longer matches and the build fails
# loudly instead of publishing a stale page.
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  jobs:
    pre_build:
      - mkdir -p docs/auto_examples
      - curl -fL -o gallery.tar.gz https://github.com/acanbay/mergen/archive/refs/heads/docs-gallery.tar.gz
      - tar xzf gallery.tar.gz -C docs/auto_examples --strip-components=1

python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs

sphinx:
  configuration: docs/conf.py
  fail_on_warning: true
