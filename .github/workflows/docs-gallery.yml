# Builds the executed example gallery in CI and publishes it to the
# dedicated docs-gallery branch (an orphan branch that only ever
# holds the generated gallery, in the same way large projects keep
# CI-built documentation in a separate git area, e.g. scikit-learn's
# scikit-learn.github.io). ReadTheDocs downloads that branch as a
# tarball in pre_build and, thanks to the sphinx-gallery MD5 cache,
# assembles the pages without executing any example, staying inside
# its build time limit. The main branch never contains generated
# files, and no GitHub release is involved.
name: docs-gallery

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * 1"   # Mondays 05:00 UTC
  push:
    branches: [main]
    paths:
      - "examples/**"
      - "src/mergen/**"
      - "pyproject.toml"

permissions:
  contents: write   # needed to push the docs-gallery branch

jobs:
  build-gallery:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package with docs extras
        run: pip install .[docs]

      - name: Build documentation, executing all examples
        run: sphinx-build -b html docs docs/_build/html

      - name: Publish the gallery to the docs-gallery branch
        run: |
          cd docs/auto_examples
          git init -b docs-gallery
          git add -A
          git -c user.name=github-actions \
              -c user.email=github-actions@users.noreply.github.com \
              commit -m "Gallery build for ${GITHUB_SHA}"
          git push --force \
            "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" \
            docs-gallery
