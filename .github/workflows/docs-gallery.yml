# Executes all fifteen examples end to end and builds the docs, as a
# scientific check that every example runs against the current code.
# Manual-only for now: ReadTheDocs builds the gallery itself, so this
# workflow no longer feeds it. Kept available on demand.
name: docs-gallery

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-gallery:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package with docs extras
        run: pip install .[docs]

      - name: Build documentation, executing all examples
        run: sphinx-build -b html docs docs/_build/html
